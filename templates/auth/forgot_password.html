<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password - ACOODA</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="auth-body">
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1e3a5f 0%,#2d5986 100%);padding:2rem">
  <div class="card" style="max-width:440px;width:100%">
    <div style="text-align:center;margin-bottom:2rem">
      <img src="{{ url_for('static', filename='images/college_logo.png') }}" style="height:60px;margin-bottom:1rem">
      <h2 style="color:var(--primary);margin:0">Forgot Password</h2>
      <p style="color:#666;margin-top:0.5rem">We'll help you reset your password</p>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}{% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
      {% endfor %}{% endif %}
    {% endwith %}
    <form method="POST">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" class="form-control" required placeholder="your@email.com">
      </div>
      <button type="submit" class="btn-auth-submit"><i class="fas fa-paper-plane"></i> Send Reset Link</button>
    </form>
    <p style="text-align:center;margin-top:1rem"><a href="{{ url_for('auth.login') }}" style="color:var(--primary)"><i class="fas fa-arrow-left"></i> Back to Login</a></p>
  </div>
</div>
</body>
</html>
